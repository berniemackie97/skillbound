name: External Crons

# Fires the two cron routes that can't run on Vercel's Hobby plan,
# which only allows daily (or less-frequent) schedules. Both routes
# authenticate with CRON_SECRET via the Authorization Bearer header.
#
# Required repository secrets:
#   PRODUCTION_URL  — e.g. https://skillbound.vercel.app (no trailing slash)
#   CRON_SECRET     — must match the same env var configured in Vercel

on:
  schedule:
    # Price alerts — every 15 minutes
    - cron: '*/15 * * * *'
    # Market history snapshots — every 6 hours, on the hour
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which cron to run manually'
        required: true
        default: 'alerts'
        type: choice
        options:
          - alerts
          - market-history

jobs:
  alerts:
    name: Price Alerts (/api/cron/alerts)
    if: github.event.schedule == '*/15 * * * *' || github.event.inputs.target == 'alerts'
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets are configured
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "::error::PRODUCTION_URL repository secret is not set"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repository secret is not set"
            exit 1
          fi

      - name: Hit /api/cron/alerts
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          RESPONSE_FILE=$(mktemp)
          STATUS=$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
            -X GET "$PRODUCTION_URL/api/cron/alerts" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90)
          echo "HTTP $STATUS"
          cat "$RESPONSE_FILE"
          echo
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::alerts cron returned HTTP $STATUS"
            exit 1
          fi

  market-history:
    name: Market History (/api/cron/market-history)
    if: github.event.schedule == '0 */6 * * *' || github.event.inputs.target == 'market-history'
    runs-on: ubuntu-latest
    steps:
      - name: Verify secrets are configured
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PRODUCTION_URL" ]; then
            echo "::error::PRODUCTION_URL repository secret is not set"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repository secret is not set"
            exit 1
          fi

      - name: Hit /api/cron/market-history
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          RESPONSE_FILE=$(mktemp)
          STATUS=$(curl -sS -o "$RESPONSE_FILE" -w '%{http_code}' \
            -X GET "$PRODUCTION_URL/api/cron/market-history" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300)
          echo "HTTP $STATUS"
          cat "$RESPONSE_FILE"
          echo
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::market-history cron returned HTTP $STATUS"
            exit 1
          fi
